name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and integration test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist artifacts exist
        run: |
          test -f dist/index.js
          test -f dist/generator.js
          test -f dist/markdown.js
          test -f dist/templates/index.js
          test -f dist/templates/research-report.js
          test -f dist/templates/plain.js
          test -f dist/templates/styles.js
          echo "All required dist files present."

      - name: Integration test (real PDF generation)
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm test
